<app-spinner *ngIf="loading"></app-spinner>

<div *ngIf="!loading && user" class="max-w-7xl mx-auto p-4">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- Perfil del usuario -->
    <div class="bg-gray-900 p-6 rounded-lg shadow-md flex flex-col items-center text-white">
      <img class="w-24 h-24 rounded-full object-cover mb-4"
        src="https://images.unsplash.com/photo-1728577740843-5f29c7586afe?q=80&w=2080&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="Foto de perfil" />
      <div class="text-center">
        <h2 class="text-lg font-semibold text-blue-400">{{ user.nombre }}</h2>
        <p class="text-sm text-gray-400">{{ user.email }}</p>
        <p class="text-sm text-gray-400">{{ user.telefono }}</p>
        <p class="text-sm text-gray-400">{{ user.direccion }}</p>
      </div>
      <button (click)="logout()"
        class="mt-4 px-4 py-2 text-sm font-medium text-red-400 border border-red-400 rounded hover:bg-red-500 hover:text-white transition">
        Cerrar sesión
      </button>
    </div>

    <!-- Tabla de pedidos -->
    <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-md overflow-x-auto">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Historial de pedidos</h2>

      <table class="min-w-full text-sm text-gray-700">
        <thead>
          <tr class="bg-gray-100 border-b">
            <th class="text-left py-2 px-4">Pedido</th>
            <th class="text-left py-2 px-4">Fecha</th>
            <th class="text-left py-2 px-4">Total</th>
            <th class="text-left py-2 px-4">Estado</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let pedido of historialPedidos" class="border-b hover:bg-gray-50">
            <td class="py-2 px-4">{{ pedido.id }}</td>
            <td class="py-2 px-4">{{ pedido.created_at | date:'short' }}</td>
            <td class="py-2 px-4">{{ pedido.total | currency:'ARS $' }}</td>
            <td class="py-2 px-4 capitalize">{{ pedido.estado }}</td>
          </tr>
          <td class="py-2 px-4" *ngIf="historialPedidos.length === 0">No tienes pedidos realizados</td>
        </tbody>
      </table>
    </div>

  </div>
</div>
