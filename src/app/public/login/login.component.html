<div class="h-full flex items-center bg-gradient-to-r from-[#0f172a] to-sky-400">
  <div
    class="flex w-10/12 sm:w-full max-w-sm mx-auto overflow-hidden bg-white rounded-lg shadow-lg dark:bg-gray-800 lg:max-w-4xl">
    <div class="hidden bg-center bg-cover lg:block lg:w-1/2"
      style="background-image: url('https://img.freepik.com/premium-vector/biophilic-design-workspace-abstract-concept-vector-illustration_107173-24984.jpg?semt=ais_hybrid');">
    </div>

    <div class="w-full px-6 py-8 md:px-8 lg:w-1/2">

      <div class="flex justify-center mx-auto">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-6 text-white">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M13.5 21v-7.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.349m0 0a3.001 3.001 0 0 0 3.75-.615A2.993 2.993 0 0 0 9.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 0 0 2.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 0 0 3.75.614m-16.5 0a3.004 3.004 0 0 1-.621-4.72l1.189-1.19A1.5 1.5 0 0 1 5.378 3h13.243a1.5 1.5 0 0 1 1.06.44l1.19 1.189a3 3 0 0 1-.621 4.72M6.75 18h3.75a.75.75 0 0 0 .75-.75V13.5a.75.75 0 0 0-.75-.75H6.75a.75.75 0 0 0-.75.75v3.75c0 .414.336.75.75.75Z" />
        </svg>



      </div>
      <br>
      <p class="mt-5 text-4xl text-center text-blue-600 0  " style="font-family: Bebas Neue;">
        Ecommerce
      </p>
      <div class="mt-8">
        <div class="flex items-center justify-between mt-4">
          <span class="w-1/5 border-b dark:border-gray-600 lg:w-1/4"></span>
          <span class="text-xs text-center text-gray-500 uppercase dark:text-gray-400 no-select">Inicia sesion con
          </span>
          <span class="w-1/5 border-b dark:border-gray-400 lg:w-1/4"></span>
        </div>
        <form class="pb-2 mt-5">
          <input type="hidden" name="provider" value="google" /><button (click)="loginWithGoogle()"
            class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-gray-400 dark:border-white  bg-none hover:bg-accent hover:text-accent-foreground h-10 px-4 w-full  py-6 hover:bg-blue-600"
            type="submit">
            <span class="mr-2"><svg stroke="currentColor" fill="currentColor" stroke-width="0" version="1.1" x="0px"
                y="0px" viewBox="0 0 48 48" enable-background="new 0 0 48 48" class="h-5 w-5" height="1em" width="1em"
                xmlns="http://www.w3.org/2000/svg">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12
                            c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24
                            c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z">
                </path>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657
                            C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36
                            c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
                <path fill="#1976D2"
                  d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571
                            c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z">
                </path>
              </svg></span><span class="dark:text-white text-blue-600 font-semibold">Google</span>
          </button>
        </form>
      </div>


      <div class="flex items-center justify-between mt-4">
        <span class="w-1/5 border-b dark:border-gray-600 lg:w-1/4"></span>
        <span class="text-xs text-center text-gray-500 uppercase dark:text-gray-400 no-select">Inicia sesion
        </span>
        <span class="w-1/5 border-b dark:border-gray-400 lg:w-1/4"></span>
      </div>

      <form (ngSubmit)="onLogin()">

        <div class="mt-4">
          <label class="block mb-2 text-sm font-medium text-gray-600 dark:text-gray-200" for="email">Email</label>
          <input type="email" [(ngModel)]="email" name="email"
            class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 focus:outline-none">
        </div>

        <div class="mt-2">
          <label class="block mb-2 text-sm font-medium text-gray-600 dark:text-gray-200"
            for="password">Contraseña</label>
          <input [(ngModel)]="password" name="password" type="password"
            class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 focus:outline-none">

        </div>
        <!-- <small class=" text-red-600 ">Usuario o contraseña
          incorrectos.</small> -->
        <div class=" mt-3">
          <button type="submit"
            class="w-full px-6 py-3 text-sm font-medium tracking-wide text-white capitalize transition-colors duration-300 transform bg-blue-800 rounded-lg hover:bg-sky-700 focus:outline-none focus:ring focus:ring-sky-300 focus:ring-opacity-50">
            Iniciar sesión
          </button>
        </div>
        <div class=" mt-3">
          <button routerLink="/register" type="button"
            class="w-full px-6 py-3 text-sm font-medium tracking-wide text-white capitalize transition-colors duration-300 transform bg-orange-800 rounded-lg hover:bg-orange-700 focus:outline-none focus:ring focus:ring-orange-300 focus:ring-opacity-50">
            Registrarse
          </button>
        </div>
      </form>

      <div class="flex items-center justify-between mt-6">
        <span class="w-1/5 border-b dark:border-gray-600 md:w-1/4"></span>
        <a href="https://www.tusitioenmerlo.com"
          class="text-xs text-blue-600 font-semibold dark:text-blue-600 no-select ">
          www.tusitioenmerlo.com</a>
        <span class="w-1/5 border-b dark:border-gray-600 md:w-1/4"></span>
      </div>
    </div>
  </div>
</div>
