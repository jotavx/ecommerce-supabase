<div class="p-6 max-w-6xl mx-auto">
  <h2 class="text-xl font-bold mb-4">Gestión de Pedidos</h2>
  <app-spinner *ngIf="loading"></app-spinner>

  <div class="overflow-x-auto border border-gray-200 rounded-lg shadow-sm">
    <table *ngIf="!loading" class="min-w-full border">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Usuario</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders" class="hover:bg-gray-50">
          <td class="p-2 border">{{ order.id }}</td>
          <td class="p-2 border">{{ order.users?.nombre || order.nombre || 'N/A' }}</td>
          <td class="p-2 border">{{ order.created_at | date:'short' }}</td>
          <td class="p-2 border"> {{ order.total | currency:'ARS $':'symbol':'1.2-2' }}</td>
          <td class="p-2 border capitalize">{{ order.estado || 'pendiente' }}</td>
          <td class="p-2 border">
            <button (click)="updateEstado(order.id, 'confirmado')"
              class="bg-green-500 text-white px-2 py-1 rounded mr-2">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
              </svg>

            </button>
            <button (click)="updateEstado(order.id, 'cancelado')" class="bg-red-500 text-white px-2 py-1 rounded mr-2">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M18.364 18.364A9 9 0 0 0 5.636 5.636m12.728 12.728A9 9 0 0 1 5.636 5.636m12.728 12.728L5.636 5.636" />
              </svg>
            </button>

            <button [routerLink]="['/orders', order.id]" class="ml-2 text-blue-600 underline"
              class="bg-blue-600 text-white px-2 py-1 rounded">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>

            </button>

            <!-- <a [routerLink]="['/orders', order.id]" class="ml-2 text-blue-600 underline">Ver detalles</a> -->
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
