<div class="p-6 max-w-6xl mx-auto w-full">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">Gestión de Categorías</h2>
  <app-spinner *ngIf="loading"></app-spinner>
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-4">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Buscar categoría..."
      class="w-full sm:w-64 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />

    <button class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm font-semibold hover:bg-blue-700 transition"
      (click)="openCategoryDialog()">
      Crear categoría
    </button>
  </div>

  <div class="overflow-x-auto border border-gray-200 rounded-lg shadow-sm">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descripción</th>
          <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        <tr *ngFor="let cat of filteredCategories()" class="hover:bg-gray-50">
          <td class="px-6 py-4 text-gray-800">{{ cat.name }}</td>
          <td class="px-6 py-4 text-gray-800">{{ cat.description }}</td>
          <td class="px-6 py-4 text-center space-x-3">
            <button class="text-blue-600 hover:text-blue-800 font-medium" (click)="openCategoryDialog(cat)">
              Editar
            </button>
            <button class="text-red-600 hover:text-red-800 font-medium" (click)="deleteCategory(cat.id)">
              Eliminar
            </button>
          </td>
        </tr>
        <tr *ngIf="filteredCategories().length === 0">
          <td colspan="3" class="px-6 py-4 text-center text-gray-500">
            No se encontraron categorías.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
